name: Deploy to VPS on main

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"

env:
  PROJECT_DIR: /projects/Talkasauras_Bot
  MAX_RETRIES: 10
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/iamdevtrivedi/talkasauras_bot

jobs:
  gate:
    runs-on: ubuntu-latest
    if: vars.SKIP_ACTIONS != 'true'
    steps:
      - run: echo "Gate passed — proceeding with CI/CD"

  lint:
    needs: [gate]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint check
        run: pnpm run lint

  prettier:
    needs: [gate]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier formatting check
        run: pnpm run format:check

  build-and-push:
    needs: [lint, prettier]
    if: vars.DEPLOY_TO_EC2 == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest

    steps:
      - name: SSH and deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          envs: PROJECT_DIR, MAX_RETRIES
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd $PROJECT_DIR
            git fetch origin main
            git reset --hard origin/main

            # Save current image as rollback candidate
            docker tag ghcr.io/iamdevtrivedi/talkasauras_bot:latest \
              ghcr.io/iamdevtrivedi/talkasauras_bot:rollback-candidate 2>/dev/null || \
              echo "No previous image to save (first deploy)"

            docker compose pull
            docker compose run --rm bot pnpm db:migrate:deploy
            docker compose down --remove-orphans
            docker compose up -d

            for i in $(seq 1 $MAX_RETRIES); do
              if curl -fs http://localhost:5004/api/v1/health; then
                echo "Health check passed — deploy successful"
                docker rmi ghcr.io/iamdevtrivedi/talkasauras_bot:rollback-candidate 2>/dev/null || true
                exit 0
              fi
              echo "Waiting for service... attempt $i/$MAX_RETRIES"
              sleep 5
            done

            echo "Health check failed after $MAX_RETRIES attempts — rolling back"

            if docker image inspect \
              ghcr.io/iamdevtrivedi/talkasauras_bot:rollback-candidate >/dev/null 2>&1; then
              docker tag ghcr.io/iamdevtrivedi/talkasauras_bot:rollback-candidate \
                ghcr.io/iamdevtrivedi/talkasauras_bot:latest
              docker rmi ghcr.io/iamdevtrivedi/talkasauras_bot:rollback-candidate 2>/dev/null || true
              docker compose down --remove-orphans
              docker compose up -d

              for i in $(seq 1 $MAX_RETRIES); do
                if curl -fs http://localhost:5004/api/v1/health; then
                  echo "Rollback successful — service restored to previous version"
                  exit 1
                fi
                sleep 5
              done

              echo "CRITICAL: Rollback also failed — service is down"
              docker compose logs --tail=50 bot
              exit 2
            else
              echo "No rollback candidate available (first deploy)"
              docker compose logs --tail=50 bot
              exit 1
            fi
