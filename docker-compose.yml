name: talkasauras-prod

services:
    bot:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: talkasauras-prod-bot
        restart: unless-stopped
        ports:
            - "5004:5000"
        environment:
            - NODE_ENV=production
        env_file:
            - .env.production
        depends_on:
            redis:
                condition: service_healthy
        sysctls:
            - net.ipv6.conf.all.disable_ipv6=1 # Disable IPv6 (Intentionally added)

    redis:
        image: redis:8-alpine
        container_name: talkasauras-prod-redis
        restart: unless-stopped
        volumes:
            - redis-data:/data
        healthcheck:
            test: ["CMD-SHELL", "redis-cli ping"]
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 5s

    redis-commander:
        image: rediscommander/redis-commander:latest
        container_name: talkasauras-prod-redis-ui
        restart: unless-stopped
        ports:
            - "5005:8081"
        environment:
            - REDIS_HOSTS=local:redis:6379
        depends_on:
            redis:
                condition: service_healthy
volumes:
    redis-data:
